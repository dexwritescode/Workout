name: Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test · ${{ matrix.device }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        device:
          - "iPhone 17 Pro Max"
          - "iPhone 17 Pro"
          - "iPhone 17"
          - "iPhone 16e"

    steps:
      - uses: actions/checkout@v4

      - name: Create signing config
        run: cp Config/Signing.xcconfig.example Config/Signing.xcconfig

      - name: Test on ${{ matrix.device }}
        run: |
          xcodebuild test \
            -scheme Workout \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_ALLOWED=NO
